<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>My Website</title>
  <meta name="description" content="A brief description of your website." />
  <meta name="keywords" content="keyword1, keyword2, keyword3" />
  <meta name="author" content="Your Name" />

  <!-- OpenGraph (social sharing previews) -->
  <meta property="og:title" content="My Website" />
  <meta property="og:description" content="A brief description of your website." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://yourusername.github.io/" />
  <meta property="og:image" content="https://yourusername.github.io/Images/general/og-image.png" />

  <!-- Twitter card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="My Website" />
  <meta name="twitter:description" content="A brief description of your website." />
  <meta name="twitter:image" content="https://yourusername.github.io/Images/general/og-image.png" />

  <!-- Preload JSON so content is snappy -->
  <link rel="preload" href="content.json" as="fetch" crossorigin="anonymous" />
  <link rel="stylesheet" href="styles.css" />

  <script defer src="app.js"></script>
</head>
<body>
  <a href="#app" class="skip-link">Skip to content</a>

  <!-- ===== Persistent Top (Banner + Hero) ===== -->
  <header id="site-header" class="site-header" role="banner">
    <!-- Always-visible banner -->
    <div class="top-banner">
      <a class="brand" href="#/home" aria-label="Home">
        <svg class="logo-animated" viewBox="0 0 880 140" preserveAspectRatio="xMinYMin meet" role="img" aria-hidden="true">
          <text x="0" y="100" class="text-body">
            MySite<tspan class="dot">.</tspan>
          </text>
        </svg>
      </a>

      <!-- Desktop inline nav -->
      <nav id="desktop-nav" class="desktop-nav" aria-label="Main navigation">
        <ul>
          <li><a href="#/home" data-route="home">Home</a></li>
          <li><a href="#/about" data-route="about">About</a></li>
          <li><a href="#/projects" data-route="projects">Projects</a></li>
          <li><a href="#/team" data-route="team">Team</a></li>
          <li><a href="#/contact" data-route="contact">Contact</a></li>
        </ul>
      </nav>

      <!-- Hamburger (mobile) -->
      <button id="menuBtn" class="hamburger" aria-expanded="false" aria-controls="site-nav" aria-label="Open menu">
        <span></span><span></span><span></span>
      </button>

      <!-- Drawer nav (mobile) -->
      <nav id="site-nav" class="nav-drawer" aria-hidden="true">
        <ul>
          <li><a href="#/home" data-route="home">Home</a></li>
          <li><a href="#/about" data-route="about">About</a></li>
          <li><a href="#/projects" data-route="projects">Projects</a></li>
          <li><a href="#/team" data-route="team">Team</a></li>
          <li><a href="#/contact" data-route="contact">Contact</a></li>
        </ul>
      </nav>
    </div>

    <!-- Hero section -->
    <section class="hero" aria-label="Site hero">
      <div class="video-wrap" aria-hidden="true">
        <!-- Optional: add a hero video or background image -->
        <!-- <video id="heroVideo" autoplay muted loop playsinline preload="metadata">
          <source src="Videos/hero.webm" type="video/webm" />
        </video> -->
        <div class="hero-bg"></div>
        <div class="video-scrim"></div>
      </div>
      <div class="hero-content max-w">
        <p class="eyebrow">Welcome</p>
        <h1 id="heroText">Loading...</h1>
      </div>
    </section>
  </header>

  <!-- ===== Swappable Page Body (dynamic) ===== -->
  <main id="app" class="page" role="main" tabindex="-1" aria-live="polite">
    <!-- Content loaded here from content.json; top section never reloads -->
  </main>

  <!-- ===== Persistent Footer ===== -->
  <footer class="site-footer">
    <div class="max-w footer-grid">
      <section>
        <h2 class="footer-heading">About</h2>
        <p id="footerAbout"></p>
      </section>

      <nav aria-label="Footer links">
        <h2 class="footer-heading">Links</h2>
        <ul class="footer-links">
          <li><a href="#/home">Home</a></li>
          <li><a href="#/about">About</a></li>
          <li><a href="#/projects">Projects</a></li>
          <li><a href="#/team">Team</a></li>
          <li><a href="#/contact">Contact</a></li>
        </ul>
      </nav>

      <section>
        <h2 class="footer-heading">Contact</h2>
        <address id="footerContact"></address>
      </section>
    </div>
    <div class="legal">
      <small>&copy; <span id="year"></span> My Website. All rights reserved.</small>
    </div>
  </footer>

  <!-- ===== Mobile Bottom Tab Bar ===== -->
  <nav id="bottom-tabs" class="bottom-tabs" aria-label="Mobile navigation">
    <a href="#/home" data-route="home" class="tab-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span>Home</span>
    </a>
    <a href="#/about" data-route="about" class="tab-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="16" x2="12" y2="12"/>
        <line x1="12" y1="8" x2="12.01" y2="8"/>
      </svg>
      <span>About</span>
    </a>
    <a href="#/projects" data-route="projects" class="tab-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
        <line x1="8" y1="21" x2="16" y2="21"/>
        <line x1="12" y1="17" x2="12" y2="21"/>
      </svg>
      <span>Projects</span>
    </a>
    <a href="#/team" data-route="team" class="tab-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 00-3-3.87"/>
        <path d="M16 3.13a4 4 0 010 7.75"/>
      </svg>
      <span>Team</span>
    </a>
  </nav>
</body>
</html>
