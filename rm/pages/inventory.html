<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory — McGhee Lab</title>
  <link rel="stylesheet" href="/rm/css/style.css">
  <script src="/rm/js/runtime-mode.js"></script>
</head>
<body>
  <div class="page">
    <div class="page-header">
      <h1 class="page-title">Lab Inventory</h1>
      <div style="display:flex;gap:8px;align-items:center;">
        <select id="category-filter" class="btn" style="font-size:14px;">
          <option value="all">All Categories</option>
        </select>
        <select id="stock-filter" class="btn" style="font-size:14px;">
          <option value="all">All Stock</option>
          <option value="full">Full</option>
          <option value="low">Low</option>
          <option value="out_of_stock">Out of Stock</option>
        </select>
        <input id="search-input" type="text" placeholder="Search items..." style="font-size:14px;padding:6px 12px;border:1px solid var(--border);border-radius:var(--radius);width:220px;">
        <button class="btn" onclick="createManualGroup()">Create Group</button>
        <button class="btn btn-primary" id="add-item">+ Add Item</button>
      </div>
    </div>
    <div class="tab-bar" id="tabs"></div>
    <div id="content"></div>
  </div>
  <script src="/rm/js/util.js"></script>
  <script src="/rm/js/nav.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore-compat.js"></script>
  <script src="/rm/js/firebase-bridge.js"></script>
  <script src="/rm/js/api-firestore-adapter.js"></script>
  <script src="/rm/js/api-routes.js"></script>
  <script src="/rm/js/live-sync-helper.js"></script>
  <script src="/rm/js/toast.js"></script>
  <script src="/rm/js/local-cache.js"></script>
  <script src="/rm/js/sync-status.js"></script>
  <script src="/rm/js/profile-bootstrap.js"></script>
  <script src="/rm/js/forms.js"></script>
  <script src="/rm/js/inventory.js"></script>
</body>
</html>
