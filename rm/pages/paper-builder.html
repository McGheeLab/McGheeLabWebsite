<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Papers — McGhee Lab</title>
  <link rel="stylesheet" href="/rm/css/style.css">
  <script src="/rm/js/runtime-mode.js"></script>
  <link rel="stylesheet" href="/rm/css/paper-editor.css">
</head>
<body>
  <div class="page">
    <div class="page-header">
      <h1 class="page-title">Papers</h1>
      <div>
        <button class="btn btn-primary" id="pb-new-paper-btn">+ New paper</button>
      </div>
    </div>
    <div id="pb-status" class="pb-status"></div>
    <div id="pb-list" class="pb-list"></div>
  </div>

  <!-- New-paper modal -->
  <div id="pb-modal" class="pb-modal" hidden>
    <div class="pb-modal-card">
      <div class="pb-modal-header">
        <h2>New paper</h2>
        <button class="pb-icon-btn" id="pb-modal-close" aria-label="Close">×</button>
      </div>
      <div class="pb-modal-body">
        <div class="form-group">
          <label for="pb-new-title">Working title</label>
          <input type="text" id="pb-new-title" placeholder="e.g. Bioprinted hydrogel constructs for…">
        </div>
        <div class="form-group">
          <label for="pb-new-id">Slug (auto)</label>
          <input type="text" id="pb-new-id" placeholder="auto-generated from title">
          <small class="form-hint">Kebab-case; must be unique within the lab.</small>
        </div>
        <div class="form-group">
          <label for="pb-new-template">Template</label>
          <select id="pb-new-template"></select>
          <small class="form-hint" id="pb-new-template-hint"></small>
        </div>
        <div class="form-group">
          <label for="pb-new-journal">Target journal</label>
          <input type="text" id="pb-new-journal" placeholder="TBD">
        </div>
        <div class="form-group">
          <label for="pb-new-repo">Repo path (optional)</label>
          <input type="text" id="pb-new-repo" placeholder="../My-Paper-Repo">
          <small class="form-hint">Sibling repo for the LaTeX source. Used by .md round-trip and LaTeX export.</small>
        </div>
        <div class="pb-modal-error" id="pb-modal-error" hidden></div>
      </div>
      <div class="pb-modal-actions">
        <button class="btn" id="pb-modal-cancel">Cancel</button>
        <button class="btn btn-primary" id="pb-modal-create">Create</button>
      </div>
    </div>
  </div>

  <script src="/rm/js/util.js"></script>
  <script src="/rm/js/nav.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore-compat.js"></script>
  <script src="/rm/js/firebase-bridge.js"></script>
  <script src="/rm/js/api-firestore-adapter.js"></script>
  <script src="/rm/js/api-routes.js"></script>
  <script src="/rm/js/live-sync-helper.js"></script>
  <script src="/rm/js/toast.js"></script>
  <script src="/rm/js/local-cache.js"></script>
  <script src="/rm/js/sync-status.js"></script>
  <script src="/rm/js/profile-bootstrap.js"></script>
  <script src="/rm/js/paper-schemas.js"></script>
  <script src="/rm/js/paper-builder.js"></script>
</body>
</html>
