<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paper Editor — McGhee Lab</title>
  <link rel="stylesheet" href="/rm/css/style.css">
  <script src="/rm/js/runtime-mode.js"></script>
  <link rel="stylesheet" href="/rm/css/paper-editor.css">
  <!-- KaTeX styles for inline math rendering. The JS module is lazy-loaded
       by paper-editor.js when a paragraph blurs into render mode. -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.css">
</head>
<body>
  <div class="pe-page">
    <div class="pe-topbar">
      <a class="pe-back" href="/rm/pages/paper-builder.html">← All papers</a>
      <input type="text" class="pe-title-input" id="pe-title" placeholder="Untitled paper" disabled>
      <div class="pe-savestate" id="pe-savestate"></div>
    </div>
    <div class="pe-readonly-banner" id="pe-readonly-banner" hidden></div>
    <div class="pe-layout">
      <aside class="pe-sidebar">
        <div class="pe-sidebar-title">Outline</div>
        <ul class="pe-sidebar-list" id="pe-outline"></ul>
        <div class="pe-sidebar-actions">
          <button class="btn pe-add-section" id="pe-add-section-btn" disabled>+ Add section</button>
        </div>
      </aside>
      <main class="pe-main" id="pe-main">
        <div class="pe-main-inner" id="pe-main-inner">
          <div class="pe-viewfilter-bar">
            <span>View:</span>
            <select id="pe-view-filter">
              <option value="mixed">Mixed (per-block toggle)</option>
              <option value="skeleton">All skeletons</option>
              <option value="body">All bodies</option>
            </select>
            <span style="margin-left: 16px;">Status:</span>
            <select id="pe-status-filter">
              <option value="all">All blocks</option>
              <option value="draft">Drafts only</option>
              <option value="needs-review">Needs review only</option>
              <option value="complete">Complete only</option>
              <option value="not-complete">Anything not complete</option>
            </select>
          </div>
          <div id="pe-content"></div>
        </div>
      </main>
      <aside class="pe-comments-pane" id="pe-comments-pane" hidden>
        <div class="pe-comments-header">
          <span class="pe-comments-title">Comments</span>
          <button class="pe-icon-btn" id="pe-comments-close" aria-label="Close">×</button>
        </div>
        <div class="pe-comments-context" id="pe-comments-context"></div>
        <div class="pe-comments-list" id="pe-comments-list"></div>
        <div class="pe-comments-composer">
          <textarea id="pe-comments-input" rows="3" placeholder="Write a comment&hellip;"></textarea>
          <button class="btn btn-primary" id="pe-comments-submit">Post</button>
        </div>
      </aside>
    </div>
  </div>

  <!-- Add-section popup template (rendered dynamically) -->
  <datalist id="pe-section-kinds-list"></datalist>

  <script src="/rm/js/util.js"></script>
  <script src="/rm/js/nav.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore-compat.js"></script>
  <script src="/rm/js/firebase-bridge.js"></script>
  <script src="/rm/js/api-firestore-adapter.js"></script>
  <script src="/rm/js/api-routes.js"></script>
  <script src="/rm/js/live-sync-helper.js"></script>
  <script src="/rm/js/toast.js"></script>
  <script src="/rm/js/local-cache.js"></script>
  <script src="/rm/js/sync-status.js"></script>
  <script src="/rm/js/profile-bootstrap.js"></script>
  <script src="/rm/js/paper-schemas.js"></script>
  <script src="/rm/js/paper-yjs.js"></script>
  <script src="/rm/js/paper-blocks.js"></script>
  <script src="/rm/js/paper-export-tex.js"></script>
  <script src="/rm/js/paper-editor.js"></script>
</body>
</html>
