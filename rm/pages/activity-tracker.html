<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activity Tracker — McGhee Lab</title>
  <link rel="stylesheet" href="/rm/css/style.css">
  <link rel="stylesheet" href="/rm/css/activity-tracker.css">
  <script src="/rm/js/runtime-mode.js"></script>
</head>
<body>
  <div class="page">
    <div class="page-header">
      <h1 class="page-title">Activity Tracker</h1>
    </div>
    <div id="tracker-root"></div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore-compat.js"></script>

  <!-- Chart.js (loaded globally; the renderer's analytics dashboard uses
       `new Chart(...)` directly). Pinned to the same version /apps/ used. -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- RM auth + adapter + cache + nav -->
  <script src="/rm/js/firebase-bridge.js"></script>
  <script src="/rm/js/profile-bootstrap.js"></script>
  <script src="/rm/js/local-cache.js"></script>
  <script src="/rm/js/util.js"></script>
  <script src="/rm/js/api-firestore-adapter.js"></script>
  <script src="/rm/js/api-routes.js"></script>
  <script src="/rm/js/live-sync-helper.js"></script>
  <script src="/rm/js/toast.js"></script>
  <script src="/rm/js/sync-status.js"></script>
  <script src="/rm/js/nav.js"></script>

  <!-- Categories bridge — copied from /apps/shared/ in V3.49 because the
       activity tracker reads RM's labConfig/categorySchema through this
       singleton. Phase C deletes /apps/shared/ entirely; the RM copy is
       the canonical one going forward. -->
  <script src="/rm/js/rm-categories.js"></script>

  <!-- Page renderer (V3.49 native port; replaces the V3.40 iframe wrapper) -->
  <script src="/rm/js/activity-tracker.js"></script>
</body>
</html>
