<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Important People — McGhee Lab</title>
  <link rel="stylesheet" href="/rm/css/style.css">
  <script src="/rm/js/runtime-mode.js"></script>
  <style>
    .dossier-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      margin-top: 16px;
      max-width: 900px;
    }
    .dossier-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      position: relative;
    }
    .dossier-card.high { border-left: 4px solid var(--green); }
    .dossier-card.moderate-high { border-left: 4px solid #84cc16; }
    .dossier-card.moderate { border-left: 4px solid var(--amber); }
    .dossier-card.low-moderate { border-left: 4px solid #fb923c; }
    .dossier-card.low { border-left: 4px solid var(--text-muted); }
    .dossier-header {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 12px;
    }
    .dossier-photo {
      width: 80px;
      height: 100px;
      object-fit: cover;
      border-radius: 6px;
      flex-shrink: 0;
      border: 2px solid var(--border);
    }
    .dossier-header-text {
      flex: 1;
      min-width: 0;
    }
    .dossier-name {
      font-size: 18px;
      font-weight: 700;
      margin: 0;
    }
    .dossier-title {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .dossier-priority {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      font-weight: 700;
      font-size: 13px;
      flex-shrink: 0;
    }
    .convo-details {
      margin-top: 12px;
      margin-bottom: 4px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .convo-details summary {
      padding: 10px 16px;
      background: var(--bg);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-muted);
      cursor: pointer;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: color .15s;
    }
    .convo-details summary::-webkit-details-marker { display: none; }
    .convo-details summary::before {
      content: '\25B6';
      font-size: 10px;
      color: var(--text-muted);
      transition: transform .15s;
    }
    .convo-details[open] summary::before {
      transform: rotate(90deg);
    }
    .convo-details summary:hover {
      color: var(--text);
    }
    .convo-details[open] summary {
      border-bottom: 1px solid var(--border);
      color: var(--primary);
    }
    .convo-body {
      padding: 14px 16px;
      background: var(--surface);
    }
    .convo-step {
      font-size: 13px;
      line-height: 1.55;
      margin-bottom: 10px;
      padding-left: 12px;
      border-left: 2px solid var(--border);
    }
    .convo-step:last-child { margin-bottom: 0; }
    .convo-label {
      font-weight: 600;
      color: var(--primary);
    }
    .convo-step em {
      color: var(--text);
    }
    .dossier-section {
      margin-top: 12px;
    }
    .dossier-section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .dossier-section p, .dossier-section li {
      font-size: 13px;
      line-height: 1.5;
      margin: 0;
    }
    .dossier-section ul {
      margin: 4px 0 0 0;
      padding-left: 18px;
    }
    .dossier-section li {
      margin-bottom: 4px;
    }
    .relevance-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .relevance-badge.high { background: var(--green-bg); color: var(--green); }
    .relevance-badge.moderate-high { background: #ecfccb; color: #3f6212; }
    .relevance-badge.moderate { background: var(--amber-bg); color: var(--amber); }
    .relevance-badge.low-moderate { background: #ffedd5; color: #9a3412; }
    .relevance-badge.low { background: var(--bg); color: var(--text-muted); }
    .context-banner {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 20px;
    }
    .context-banner h2 {
      font-size: 16px;
      margin: 0 0 8px 0;
    }
    .context-banner ul {
      margin: 8px 0 0 0;
      padding-left: 18px;
      font-size: 13px;
      line-height: 1.6;
    }
    .filter-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .filter-btn {
      padding: 4px 12px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: transparent;
      cursor: pointer;
      font-size: 13px;
    }
    .filter-btn.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="page-header">
      <h1 class="page-title">Important People</h1>
      <div>
        <button class="btn btn-primary" id="add-contact">+ Add Contact</button>
      </div>
    </div>
    <div class="tab-bar" id="tabs"></div>
    <div id="context-area"></div>
    <div class="filter-bar" id="filters"></div>
    <div id="content"></div>
  </div>
  <script src="/rm/js/util.js"></script>
  <script src="/rm/js/nav.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore-compat.js"></script>
  <script src="/rm/js/firebase-bridge.js"></script>
  <script src="/rm/js/api-firestore-adapter.js"></script>
  <script src="/rm/js/api-routes.js"></script>
  <script src="/rm/js/live-sync-helper.js"></script>
  <script src="/rm/js/toast.js"></script>
  <script src="/rm/js/local-cache.js"></script>
  <script src="/rm/js/sync-status.js"></script>
  <script src="/rm/js/profile-bootstrap.js"></script>
  <script src="/rm/js/forms.js"></script>
  <script src="/rm/js/important-people.js"></script>
</body>
</html>
