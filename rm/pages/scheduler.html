<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scheduler — McGhee Lab</title>
  <link rel="stylesheet" href="/rm/css/style.css">
  <link rel="stylesheet" href="/rm/css/scheduler.css">
  <script src="/rm/js/runtime-mode.js"></script>
</head>
<body>
  <div class="page">
    <div class="page-header">
      <h1 class="page-title">Scheduler</h1>
    </div>
    <p class="muted-text" style="max-width:720px;margin-bottom:8px;">
      Create shareable scheduling links for talks, meetings, and reviews.
      Guests open the invite URL, fill in availability, and admins assign
      slots from the editor view.
    </p>
    <div id="sched-root"></div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore-compat.js"></script>

  <!-- RM auth + adapter + cache + nav -->
  <script src="/rm/js/firebase-bridge.js"></script>
  <script src="/rm/js/profile-bootstrap.js"></script>
  <script src="/rm/js/local-cache.js"></script>
  <script src="/rm/js/util.js"></script>
  <script src="/rm/js/api-firestore-adapter.js"></script>
  <script src="/rm/js/api-routes.js"></script>
  <script src="/rm/js/live-sync-helper.js"></script>
  <script src="/rm/js/toast.js"></script>
  <script src="/rm/js/sync-status.js"></script>
  <script src="/rm/js/nav.js"></script>

  <!-- Scheduling engine (stateless; emits HTML + wires events).
       Loaded from the repo root because it's also used by the public-site
       SPA's #/dashboard/scheduler editor. -->
  <script src="/scheduler.js"></script>

  <!-- Page renderer (My Schedulers tab; My Schedule deferred to V3.51) -->
  <script src="/rm/js/scheduler.js"></script>
</body>
</html>
