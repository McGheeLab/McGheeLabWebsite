<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Completed Tasks — McGhee Lab</title>
  <link rel="stylesheet" href="/rm/css/style.css">
  <script src="/rm/js/runtime-mode.js"></script>
</head>
<body>
  <div class="page">
    <div class="tab-bar" id="task-hub-tabs"></div>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const HUB = [
          { label: 'Dashboard', href: '/rm/pages/tasks.html' },
          { label: 'Add Task',  href: '/rm/pages/tasks-add.html' },
          { label: 'Task List', href: '/rm/pages/tasks-inbox.html' },
          { label: 'Completed', href: '/rm/pages/tasks-archive.html', current: true },
        ];
        const bar = document.getElementById('task-hub-tabs');
        HUB.forEach(t => {
          const a = document.createElement('a');
          a.href = t.href;
          a.className = 'tab-btn' + (t.current ? ' active' : '');
          a.textContent = t.label;
          a.style.textDecoration = 'none';
          bar.appendChild(a);
        });
      });
    </script>
    <div class="page-header">
      <h1 class="page-title">Completed Tasks</h1>
    </div>
    <div id="content">Loading…</div>
  </div>
  <script src="/rm/js/util.js"></script>
  <script src="/rm/js/nav.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore-compat.js"></script>
  <script src="/rm/js/firebase-bridge.js"></script>
  <script src="/rm/js/api-firestore-adapter.js"></script>
  <script src="/rm/js/api-routes.js"></script>
  <script src="/rm/js/live-sync-helper.js"></script>
  <script src="/rm/js/toast.js"></script>
  <script src="/rm/js/local-cache.js"></script>
  <script src="/rm/js/sync-status.js"></script>
  <script src="/rm/js/profile-bootstrap.js"></script>
  <script src="/rm/js/activity-subnav.js"></script>
  <script src="/rm/js/yr-shared.js"></script>
  <script src="/rm/js/card-grid.js"></script>
  <script src="/rm/js/tasks-archive-buckets.js"></script>
</body>
</html>
