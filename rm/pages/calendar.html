<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar — McGhee Lab</title>
  <link rel="stylesheet" href="/rm/css/style.css">
  <script src="/rm/js/runtime-mode.js"></script>
</head>
<body>
  <div class="page">
    <div class="page-header">
      <h1 class="page-title">Calendar</h1>
    </div>
    <div class="tab-bar" id="cal-tabs">
      <button class="tab-btn active" data-tab="history">History</button>
      <button class="tab-btn" data-tab="outlook">Outlook Events</button>
      <button class="tab-btn" data-tab="fullcal">Full Calendar</button>
      <button class="tab-btn" data-tab="booked">Booked Time</button>
      <button class="tab-btn" data-tab="availability">Availability</button>
    </div>
    <div id="content"></div>
  </div>
  <style>
    /* History tab — same look as year-review */
    .ch-toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
    .ch-cat-toggle{padding:4px 10px;font-size:12px;font-weight:600;text-transform:uppercase;border-radius:14px;cursor:pointer;user-select:none;border:1px solid transparent;transition:opacity .1s}
    .ch-cat-toggle.off{opacity:.35;filter:grayscale(1);background:#f3f4f6 !important;color:#9ca3af !important;border-color:#e5e7eb}
    .ch-summary{padding:14px 18px;background:#eff6ff;border:1px solid #dbeafe;border-radius:10px;margin-bottom:16px}
    .ch-analytics{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
    @media (max-width:900px){.ch-analytics{grid-template-columns:1fr}}
    .ch-panel{padding:12px 14px;background:#fff;border:1px solid #e5e7eb;border-radius:8px}
    .ch-panel h3{margin:0 0 8px 0;font-size:13px;color:#374151;text-transform:uppercase;letter-spacing:.5px}
    .ch-timeline-wrap{height:220px;position:relative}
    #cal-hist-top{height:220px;overflow-y:auto;overscroll-behavior:contain}
    /* Reserve vertical space so the page doesn't collapse when a search
       narrows the list — keeps the toolbar pinned at the top of its
       section instead of riding up as rows disappear. */
    #cal-hist-rows,#outlook-rows,#booked-rows{min-height:65vh}
    .ch-top-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:13px;border-bottom:1px solid #f1f5f9;cursor:pointer}
    .ch-top-row:last-child{border-bottom:none}
    .ch-top-row:hover{background:#f9fafb}
    .ch-top-row.active{background:#eff6ff}
    .ch-top-row .lbl{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
    .ch-top-row .meta{color:#6b7280;font-size:12px;margin-left:10px;font-variant-numeric:tabular-nums}
    .ch-line{display:grid;grid-template-columns:140px 110px 1fr 80px 110px 60px;gap:10px;align-items:center;padding:6px 10px;font-size:13px;border-bottom:1px solid #f1f5f9;cursor:pointer;text-align:left}
    .ch-line:hover{background:#f9fafb}
    .ch-line .col-date{color:#6b7280;font-size:12px;font-variant-numeric:tabular-nums}
    .ch-line .col-main .title{font-weight:500;color:#111827;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .ch-line .col-main .sub{color:#6b7280;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
    .ch-line .col-meta{color:#4b5563;font-size:12px;text-align:right}
    .ch-line .col-stars{display:flex;justify-content:flex-end;align-items:center}
    .ch-line .col-actions{display:flex;justify-content:flex-end;gap:8px}
    .ch-detail{padding:12px 16px;background:#fafafa;border-top:1px solid #f1f5f9;font-size:12px}
    .ch-detail .label{color:#6b7280;text-transform:uppercase;letter-spacing:.4px;font-size:10px;margin-bottom:3px}
    .ch-detail .body{white-space:pre-wrap;background:#fff;border:1px solid #e5e7eb;border-radius:6px;padding:8px 10px;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,monospace;max-height:220px;overflow:auto;margin-bottom:8px}
    .ch-del-btn{background:none;border:none;color:#9ca3af;cursor:pointer;font-size:15px;padding:2px 6px;border-radius:4px;line-height:1;opacity:.55;transition:opacity .1s, background .1s, color .1s}
    .ch-line:hover .ch-del-btn{opacity:1}
    .ch-del-btn:hover{background:#fee2e2;color:#dc2626}
    .ch-group-recat-btn{background:none;border:none;color:#6b7280;cursor:pointer;font-size:15px;padding:2px 6px;border-radius:4px;line-height:1;opacity:.7;transition:opacity .1s, background .1s}
    .ch-line:hover .ch-group-recat-btn{opacity:1}
    .ch-group-recat-btn:hover{background:#e0e7ff;color:#3730a3}
  </style>
  <script src="/rm/js/util.js"></script>
  <script src="/rm/js/nav.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore-compat.js"></script>
  <script src="/rm/js/firebase-bridge.js"></script>
  <script src="/rm/js/api-firestore-adapter.js"></script>
  <script src="/rm/js/api-routes.js"></script>
  <script src="/rm/js/live-sync-helper.js"></script>
  <script src="/rm/js/toast.js"></script>
  <script src="/rm/js/local-cache.js"></script>
  <script src="/rm/js/sync-status.js"></script>
  <script src="/rm/js/profile-bootstrap.js"></script>
  <script src="/rm/js/activity-subnav.js"></script>
  <script src="/rm/js/forms.js"></script>
  <script src="/rm/js/yr-shared.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="/rm/js/task-quick-builder.js"></script>
  <script src="/rm/js/calendar.js"></script>
  <script src="/rm/js/availability.js"></script>
</body>
</html>
