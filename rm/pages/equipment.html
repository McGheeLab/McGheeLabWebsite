<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Equipment Scheduler — McGhee Lab</title>
  <link rel="stylesheet" href="/rm/css/style.css">
  <link rel="stylesheet" href="/rm/css/equipment.css">
  <script src="/rm/js/runtime-mode.js"></script>
</head>
<body>
  <div class="page">
    <div class="page-header">
      <h1 class="page-title">Equipment Scheduler</h1>
    </div>
    <div id="equipment-root"></div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore-compat.js"></script>

  <!-- Google Identity Services — required for the admin's "Push bookings to
       Google Calendar" flow. The renderer's pushBookingsToCalendar() (in
       equipment.js) calls google.accounts.oauth2.initTokenClient(...) and
       stores the token in sessionStorage under `equip_gcal_token`. The
       sessionStorage→Firestore token-storage refactor is intentionally out
       of scope for V3.51; admin re-OAuths once per browser session, same
       behavior as the standalone lab app. -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <!-- RM auth + adapter + cache + nav -->
  <script src="/rm/js/firebase-bridge.js"></script>
  <script src="/rm/js/profile-bootstrap.js"></script>
  <script src="/rm/js/local-cache.js"></script>
  <script src="/rm/js/util.js"></script>
  <script src="/rm/js/api-firestore-adapter.js"></script>
  <script src="/rm/js/api-routes.js"></script>
  <script src="/rm/js/live-sync-helper.js"></script>
  <script src="/rm/js/toast.js"></script>
  <script src="/rm/js/sync-status.js"></script>
  <script src="/rm/js/nav.js"></script>

  <!-- Page renderer (V3.51 native port; replaces V3.40 iframe wrapper). -->
  <script src="/rm/js/equipment.js"></script>
</body>
</html>
