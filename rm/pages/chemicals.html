<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chemical Safety — McGhee Lab</title>
  <link rel="stylesheet" href="/rm/css/style.css">
  <script src="/rm/js/runtime-mode.js"></script>
</head>
<body>
  <div class="page">
    <div class="page-header">
      <h1 class="page-title">Chemical Safety</h1>
      <div style="display:flex;gap:8px;align-items:center;">
        <select id="hazard-filter" class="btn" style="font-size:14px;">
          <option value="all">All Hazard Levels</option>
          <option value="danger">Danger</option>
          <option value="warning">Warning</option>
          <option value="none">No Data</option>
        </select>
        <input id="search-input" type="text" placeholder="Search chemicals..." style="font-size:14px;padding:6px 12px;border:1px solid var(--border);border-radius:var(--radius);width:220px;">
        <label class="btn local-only" id="import-sds-btn" style="cursor:pointer;background:#059669;color:white;border:none;" title="Available when running locally via server.py (Claude API parses the PDF).">
          Import SDS PDF
          <input type="file" accept=".pdf" multiple style="display:none;" id="import-sds-input">
        </label>
        <button class="btn btn-primary" id="add-chemical">+ Add Chemical</button>
      </div>
    </div>
    <div class="tab-bar" id="tabs"></div>
    <div id="content"></div>
  </div>
  <script src="/rm/js/util.js"></script>
  <script src="/rm/js/nav.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore-compat.js"></script>
  <script src="/rm/js/firebase-bridge.js"></script>
  <script src="/rm/js/api-firestore-adapter.js"></script>
  <script src="/rm/js/api-routes.js"></script>
  <script src="/rm/js/live-sync-helper.js"></script>
  <script src="/rm/js/toast.js"></script>
  <script src="/rm/js/local-cache.js"></script>
  <script src="/rm/js/sync-status.js"></script>
  <script src="/rm/js/profile-bootstrap.js"></script>
  <script src="/rm/js/forms.js"></script>
  <script src="/rm/js/chemicals.js"></script>
</body>
</html>
