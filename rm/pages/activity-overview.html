<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activity Overview — McGhee Lab</title>
  <link rel="stylesheet" href="/rm/css/style.css">
  <script src="/rm/js/runtime-mode.js"></script>
  <style>
    /* Top action bar: Import / Run suggester + status line. */
    .act-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:20px}
    .act-status{font-size:12px;color:var(--text-muted);flex:1 1 auto;min-width:200px}
    .act-status.running{color:#1e40af;font-weight:500}
    .act-status.err{color:var(--red)}
    .btn.is-running{background:#1e40af;border-color:#1e40af;opacity:.9;cursor:progress}
    .btn.is-running > span::before{content:"";display:inline-block;width:10px;height:10px;margin-right:6px;border:2px solid #fff;border-right-color:transparent;border-radius:50%;vertical-align:-1px;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* Live progress panel for Import / Process — populated by activity-overview.js. */
    .job-progress{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
    .job-progress:empty{display:none}
    .jp-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;box-shadow:var(--shadow)}
    .jp-card.jp-running{border-color:#1e40af}
    .jp-card.jp-ok{border-color:#16a34a}
    .jp-card.jp-err{border-color:var(--red)}
    .jp-head{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:8px;font-size:13px}
    .jp-title{color:var(--text)}
    .jp-elapsed{color:var(--text-muted);font-size:12px;font-variant-numeric:tabular-nums}
    .jp-bar{height:4px;background:#e5e7eb;border-radius:2px;overflow:hidden;margin-bottom:8px}
    .jp-bar-fill{height:100%;background:#1e40af;transition:width .3s ease}
    .jp-card.jp-ok .jp-bar-fill{background:#16a34a}
    .jp-card.jp-err .jp-bar-fill{background:var(--red)}
    .jp-steps{list-style:none;margin:0;padding:0;font-size:12.5px;display:flex;flex-direction:column;gap:3px}
    .jp-step{display:grid;grid-template-columns:18px 1fr auto;column-gap:8px;align-items:baseline}
    .jp-step .jp-step-icon{font-weight:700;text-align:center}
    .jp-step.ok .jp-step-icon{color:#16a34a}
    .jp-step.err .jp-step-icon{color:var(--red)}
    .jp-step.running .jp-step-icon{color:#1e40af;animation:spin 1.2s linear infinite;display:inline-block}
    .jp-step-label{color:var(--text)}
    .jp-step-time{color:var(--text-muted);font-variant-numeric:tabular-nums;font-size:11.5px}
    .jp-step-note{grid-column:2 / -1;color:var(--text-muted);font-size:11.5px;font-family:ui-monospace,Menlo,monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

    /* Stat cards grid */
    .act-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px}
    .act-stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow)}
    .act-stat .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);font-weight:600;margin-bottom:6px}
    .act-stat .big{font-size:26px;font-weight:700;color:var(--text);line-height:1.1}
    .act-stat .big.warn{color:var(--amber)}
    .act-stat .big.ok{color:var(--green)}
    .act-stat .sub{font-size:12px;color:var(--text-muted);margin-top:4px}

    /* Jump-off tiles to sub-pages */
    .act-tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px;margin-bottom:24px}
    .act-tile{display:block;text-decoration:none;color:inherit;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);transition:transform .08s, box-shadow .15s, border-color .15s}
    .act-tile:hover{transform:translateY(-1px);box-shadow:0 3px 12px rgba(0,0,0,0.1);border-color:var(--primary)}
    .act-tile h3{font-size:14px;font-weight:600;color:var(--text);margin:0 0 4px 0;display:flex;align-items:center;justify-content:space-between;gap:8px}
    .act-tile h3 .badge{font-size:12px;font-weight:700;background:var(--primary);color:#fff;border-radius:10px;padding:2px 9px;min-width:28px;text-align:center}
    .act-tile h3 .badge.muted{background:var(--border);color:var(--text-muted)}
    .act-tile p{font-size:13px;color:var(--text-muted);margin:0}

    /* Recent activity list */
    .act-recent{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
    .act-recent h2{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);padding:12px 16px;margin:0;border-bottom:1px solid var(--border)}
    .act-recent-row{display:grid;grid-template-columns:110px 80px 1fr 140px;gap:10px;padding:6px 16px;font-size:13px;border-bottom:1px solid #f1f5f9;align-items:center}
    .act-recent-row:last-child{border-bottom:none}
    .act-recent-row .when{color:var(--text-muted);font-size:12px;font-variant-numeric:tabular-nums}
    .act-recent-row .kind{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;padding:2px 8px;border-radius:10px;background:var(--bg);color:var(--text-muted);text-align:center}
    .act-recent-row .kind.email{background:#dbeafe;color:#1e40af}
    .act-recent-row .kind.event{background:#ede9fe;color:#5b21b6}
    .act-recent-row .title{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
    .act-recent-row .sub{color:var(--text-muted);font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:right}

    .act-section-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);margin:0 0 10px 0}

    /* Category Explorer — search, aggregate, merge. */
    .cx-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:24px}
    .cx-header{display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--bg)}
    .cx-search{flex:1;min-width:200px;padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;background:var(--surface)}
    .cx-search:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px rgba(37,99,235,.15)}
    .cx-counts{font-size:12px;color:var(--text-muted)}
    .cx-pills{display:flex;flex-direction:column;gap:6px;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--surface)}
    .cx-pills:empty{display:none}
    .cx-pill-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
    .cx-pill-row.cx-pill-sub{padding-left:8px;border-left:2px solid var(--border);margin-left:4px}
    .cx-pill-arrow{color:var(--text-muted);font-size:12px;margin-right:2px;user-select:none}
    .cx-pill{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:999px;border:1px solid var(--border);background:var(--surface);color:var(--text-muted);font-size:12px;cursor:pointer;user-select:none;font-weight:500}
    .cx-pill:hover{background:var(--bg);color:var(--text)}
    .cx-pill.active{background:var(--primary);color:#fff;border-color:var(--primary)}
    .cx-pill .cx-pill-count{font-size:11px;opacity:.75;font-variant-numeric:tabular-nums}
    .cx-pill-all{font-weight:600}
    /* Drag-to-reparent: drop a cx-row onto an L1 pill to swap its category
       while keeping the sub_category (and deeper paths) intact. */
    .cx-row[draggable="true"]{cursor:grab}
    .cx-row.cx-dragging{opacity:.5;cursor:grabbing}
    .cx-pills.cx-drop-armed{outline:2px dashed rgba(37,99,235,.45);outline-offset:-2px;background:rgba(37,99,235,.04)}
    .cx-pills.cx-drop-armed::before{content:'Drop on a compatible target — rows go to any L1, pills rename at the same level';display:block;font-size:12px;color:var(--primary);margin-bottom:8px;font-weight:500}
    /* In split view the pill row scopes the right pane instead of filtering
       the left — label it so the intent is unmistakable. */
    .cx-pills.scoped-right::before{
      content:'these pills scope the target picker →';
      display:block;font-size:11px;color:var(--primary);font-weight:500;
      letter-spacing:.3px;margin-bottom:4px;text-transform:uppercase;
    }
    .cx-pill[draggable="true"]{cursor:grab}
    .cx-pill[draggable="true"].cx-dragging{opacity:.5;cursor:grabbing}
    .cx-pill-sub-item.cx-drop-over{background:var(--primary);color:#fff;border-color:var(--primary);transform:scale(1.12);box-shadow:0 0 0 3px rgba(37,99,235,.3);transition:transform .1s, background .1s}

    /* Big, color-coded L1 pills act as drop zones. Each pill carries its
       category hue via a --cat-color custom property set at render time. */
    .cx-pill-l1{
      padding:10px 18px;
      font-size:14px;
      font-weight:600;
      text-transform:uppercase;
      letter-spacing:.4px;
      border-width:2px;
      border-color:var(--cat-color,var(--border));
      color:var(--cat-color,var(--text-muted));
      background:color-mix(in srgb, var(--cat-color,var(--border)) 8%, white);
      transition:transform .1s, background .15s, color .15s;
    }
    .cx-pill-l1:hover{
      background:color-mix(in srgb, var(--cat-color,var(--border)) 18%, white);
      color:var(--cat-color,var(--text));
    }
    .cx-pill-l1.active{
      background:var(--cat-color,var(--primary));
      color:#fff;
      border-color:var(--cat-color,var(--primary));
    }
    .cx-pill-l1 .cx-pill-count{
      font-size:12px;
      padding:1px 7px;
      border-radius:999px;
      background:rgba(255,255,255,.55);
      color:inherit;
    }
    .cx-pill-l1.active .cx-pill-count{background:rgba(255,255,255,.25);color:#fff}
    /* Drop-over highlight is louder than hover so the target is unambiguous */
    .cx-pill-l1.cx-drop-over{
      background:var(--cat-color,var(--primary));
      color:#fff;
      border-color:var(--cat-color,var(--primary));
      transform:scale(1.1);
      box-shadow:0 0 0 4px color-mix(in srgb, var(--cat-color,var(--primary)) 25%, transparent);
    }
    /* Keep tight spacing for progressive sub-pills — only the L1 row is bulky */
    .cx-pills.cx-drop-armed .cx-pill-l1{border-style:dashed}
    .cx-pill.cx-drop-over{background:var(--primary);color:#fff;border-color:var(--primary);transform:scale(1.06);transition:transform .1s,background .1s}
    .cx-row.seed-only{background:repeating-linear-gradient(-45deg,transparent 0 8px,rgba(37,99,235,.04) 8px 16px)}
    .cx-row.seed-only .cx-row-counts::before{content:'empty seed';font-style:italic;color:var(--text-muted)}
    /* Tree view — primary visual in Phase 1 of the reorg redesign. Each node
       is a flex row with depth-based padding. Expanded nodes reveal children
       (more nodes) and items (via existing .cx-items-row). */
    .cx-tree-wrap{display:flex;flex-direction:column}
    /* Grid: handle | chevron | checkbox | label | count | actions. The
       drag-handle is the ONLY thing that can initiate a drag — the row
       itself stays non-draggable until mousedown on the handle. Fixes
       the "drag only works once" bug by keeping drag initiation off
       the interactive children (checkbox, buttons, label) that
       otherwise race with the row's dragstart. */
    .cx-tree-node{
      display:grid;grid-template-columns:18px 22px 22px 1fr 56px auto;gap:8px;
      align-items:center;padding:5px 8px 5px 8px;font-size:13px;
      border-bottom:1px solid #f5f7fa;background:transparent;transition:background .08s;
    }
    .cx-tree-node:hover{background:rgba(15,23,42,.03)}
    .cx-tree-node.expanded{background:rgba(15,23,42,.02)}
    .cx-tree-node.cx-dragging{opacity:.5}
    .cx-tree-node.cx-drop-over{background:color-mix(in srgb, var(--primary) 14%, white);outline:2px solid var(--primary);outline-offset:-2px}

    /* The grab-handle lives at the start of each draggable row. Grayed
       until hover so it's unobtrusive; colored when the user is over it
       so the affordance is unmistakable. Cursor:grab → grabbing for
       standard feedback. */
    .cx-drag-handle{
      color:#cbd5e1;font-size:14px;cursor:grab;user-select:none;
      display:flex;align-items:center;justify-content:center;
      line-height:1;height:100%;letter-spacing:-1px;
      font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,monospace;
      transition:color .1s;padding:0;border:none;background:transparent;
    }
    .cx-tree-node:hover .cx-drag-handle,
    .cx-items-row:hover .cx-drag-handle,
    .cx-row:hover .cx-drag-handle{color:#64748b}
    .cx-drag-handle:hover{color:var(--primary) !important}
    .cx-drag-handle:active{cursor:grabbing}

    /* Manual drag ghost — follows the cursor during row drags. Positioned
       fixed so it floats above everything; pointer-events:none so it
       doesn't intercept the elementFromPoint lookup that finds drop
       targets under the cursor. */
    .cx-drag-ghost{
      position:fixed;z-index:100000;pointer-events:none;
      background:#0f172a;color:#fff;padding:8px 14px;border-radius:8px;
      font-size:13px;font-family:system-ui,-apple-system,sans-serif;
      box-shadow:0 6px 22px rgba(0,0,0,.35);
      display:flex;align-items:center;gap:8px;
      transform:translate(0,0);white-space:nowrap;
    }
    .cx-drag-ghost-icon{font-size:16px;line-height:1}
    .cx-drag-ghost-count{font-size:13px}
    .cx-drag-ghost-count strong{font-size:15px}
    .cx-drag-ghost-mode{
      font-size:10.5px;padding:2px 7px;border-radius:999px;
      background:rgba(255,255,255,.18);color:#bfdbfe;font-weight:500;
      letter-spacing:.3px;text-transform:uppercase;
    }
    /* Body cursor changes during an active manual drag */
    body:has(.cx-drag-ghost){cursor:grabbing !important}
    .cx-tree-chev{
      background:transparent;border:none;color:#94a3b8;cursor:pointer;font-size:12px;
      padding:0;width:22px;height:22px;display:flex;align-items:center;justify-content:center;
    }
    .cx-tree-chev:disabled{cursor:default;opacity:.35}
    .cx-tree-chev:not(:disabled):hover{color:var(--text)}
    .cx-tree-check{margin:0}
    .cx-tree-check-spacer{width:16px;display:inline-block}
    .cx-tree-label{
      overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
      font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,monospace;
      font-size:12.5px;color:#111827;cursor:pointer;
    }
    .cx-tree-label.l1{
      font-family:inherit;font-weight:700;font-size:13px;text-transform:uppercase;
      letter-spacing:.4px;color:var(--cat-color,#111827);
    }
    .cx-tree-label-editing{
      outline:2px solid var(--primary);outline-offset:2px;background:#fff;
      border-radius:2px;cursor:text;padding:0 2px;
    }
    .cx-tree-count{
      font-size:11.5px;color:#6b7280;font-variant-numeric:tabular-nums;text-align:right;
      padding:0 2px;
    }
    .cx-tree-node.expanded .cx-tree-count{color:#374151;font-weight:600}
    .cx-tree-actions{display:flex;gap:4px;justify-content:flex-end;align-items:center}
    .cx-tree-actions button{font-size:11px;padding:2px 8px}
    .cx-tree-pin{
      background:transparent;border:none;cursor:pointer;font-size:14px;
      padding:0 4px;opacity:.35;transition:opacity .1s, transform .1s;
    }
    .cx-tree-node:hover .cx-tree-pin{opacity:.8}
    .cx-tree-pin.pinned{opacity:1;transform:scale(1.1)}
    .cx-tree-pin:hover{opacity:1;transform:scale(1.15)}
    .cx-tree-children{display:flex;flex-direction:column;border-left:2px solid var(--cat-color,#e5e7eb);margin-left:12px}
    .cx-tree-items{display:flex;flex-direction:column;gap:1px;padding:4px 0 6px 0}

    /* The Category Explorer is the primary organization surface, so give it a
       generous default height that the user can resize up/down via the handle
       or jump to fullscreen via the expand button. */
    .cx-list{max-height:120vh;height:80vh;overflow:auto;resize:vertical}
    .cx-wrap.cx-expanded .cx-list{height:calc(100vh - 140px);max-height:calc(100vh - 140px)}
    .cx-wrap.cx-expanded{
      position:fixed;inset:20px;z-index:1000;margin:0;display:flex;flex-direction:column;
      background:var(--surface);box-shadow:0 12px 48px rgba(0,0,0,.25);
    }
    .cx-wrap.cx-expanded .cx-split{flex:1;min-height:0}
    .cx-wrap.cx-expanded .cx-split > .cx-list{flex:1;height:auto;max-height:none;resize:none}
    .cx-wrap.cx-expanded .cx-split-right{max-height:none;flex:1}
    /* Backdrop shown behind the fullscreen explorer */
    .cx-expand-backdrop{position:fixed;inset:0;z-index:999;background:rgba(15,23,42,.35);animation:cxfade .15s ease-out}
    @keyframes cxfade{from{opacity:0}to{opacity:1}}
    .cx-row{display:grid;grid-template-columns:18px 28px 110px 1fr 200px auto;gap:12px;padding:9px 16px;align-items:center;border-bottom:1px solid #f1f5f9;font-size:13px}
    .cx-row:hover{background:var(--bg)}
    .cx-row.expanded{background:var(--bg)}
    .cx-row.row-selected{background:#eff6ff}
    .cx-row.row-selected:hover{background:#dbeafe}
    .cx-row-check{display:flex;align-items:center;justify-content:center}
    .cx-bulkbar{display:flex;gap:10px;align-items:center;padding:8px 16px;background:#eff6ff;border-bottom:1px solid #bfdbfe;font-size:12.5px;color:#1e3a8a}
    .cx-bulkbar strong{color:#1e3a8a}
    .cx-bulkbar button{font-size:12px;padding:3px 10px}
    .cx-bulkbar .spacer{flex:1}
    .cx-select-btn-on{background:var(--primary) !important;color:#fff !important;border-color:var(--primary) !important}
    .cx-row-cat{font-weight:600;color:var(--text);font-size:12px;text-transform:uppercase;letter-spacing:.3px}
    .cx-row-sub{color:var(--text);font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,monospace;font-size:12.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .cx-row-sub.empty{color:var(--text-muted);font-style:italic}
    .cx-row-counts{font-size:11.5px;color:var(--text-muted);font-variant-numeric:tabular-nums;display:flex;gap:10px;justify-content:flex-end}
    .cx-row-counts span{white-space:nowrap}
    .cx-row-btns{display:flex;gap:4px}
    .cx-row-btns button{font-size:11px;padding:3px 8px}
    .cx-detail{padding:8px 16px 12px 16px;background:#fafafa;border-bottom:1px solid #f1f5f9}
    /* Stack of per-item rows. Each row is its own grid so it can be draggable
       + selectable independently. Select-mode adds a 28px checkbox column. */
    .cx-items{display:flex;flex-direction:column;gap:1px;font-size:12px;color:#374151}
    .cx-items-wrap{display:flex;flex-direction:column}
    /* Always-on checkbox (Phase 4) — 7-column grid permanently. */
    .cx-items-row{
      display:grid;grid-template-columns:18px 22px 24px 70px 80px 1fr 160px 64px;
      gap:8px;align-items:center;padding:3px 4px;border-radius:3px;
      cursor:grab;background:transparent;transition:background .08s;
    }
    .cx-items-row:hover{background:rgba(0,0,0,.035)}
    .cx-items-row.row-selected{background:#dbeafe}
    .cx-items-row.row-selected:hover{background:#bfdbfe}
    .cx-items-row.cx-dragging{opacity:.45;cursor:grabbing}
    .cx-items-row > div, .cx-items-row > button{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
    .cx-item-chev{background:transparent;border:none;color:#94a3b8;cursor:pointer;font-size:11px;padding:0;width:22px}
    .cx-item-chev:hover{color:#1e3a8a}
    .cx-item-check{display:flex;align-items:center;justify-content:center}
    .cx-item-when{color:#6b7280;font-variant-numeric:tabular-nums;font-size:11.5px}
    .cx-item-title{color:#111827}
    .cx-item-extra{color:#6b7280;font-size:11.5px}
    .cx-item-body{
      grid-column:1/-1;padding:8px 12px 12px 34px;font-size:11.5px;color:#475569;
      background:#f8fafc;border-left:3px solid var(--border);margin:2px 0 4px 0;
      line-height:1.5;
    }
    .cx-item-body-summary{margin-bottom:8px}
    .cx-detail-loading,.cx-detail-empty{color:var(--text-muted);font-style:italic;font-size:12px}
    .cx-detail-err{color:#b91c1c;font-size:12px}
    .cx-detail-headers{
      display:grid;grid-template-columns:max-content 1fr;gap:3px 12px;
      margin-bottom:8px;font-size:12px;background:#fff;
      padding:8px 10px;border:1px solid var(--border);border-radius:4px;
    }
    .cx-detail-row{display:contents}
    .cx-detail-label{
      color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;
      font-weight:600;font-size:10.5px;padding-top:2px;
    }
    .cx-detail-section{
      font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;
      font-weight:700;color:var(--text-muted);margin:8px 0 4px 0;
    }
    .cx-detail-text{
      white-space:pre-wrap;word-break:break-word;font-family:inherit;
      margin:0;padding:8px 10px;background:#fff;border:1px solid var(--border);
      border-radius:4px;line-height:1.5;font-size:12.5px;color:#111827;
      max-height:400px;overflow:auto;
    }
    .cx-detail-iframe{
      width:100%;height:400px;border:1px solid var(--border);border-radius:4px;background:#fff;
    }
    .cx-detail-attachments{margin-top:8px}
    .cx-detail-attachment{
      display:inline-block;margin:2px 6px 2px 0;padding:3px 10px;
      font-size:12px;background:#fff;border:1px solid var(--border);border-radius:999px;
      color:var(--text);text-decoration:none;
    }
    .cx-detail-attachment:hover{background:var(--bg);border-color:var(--primary);color:var(--primary)}

    /* Shared expdet-* classes from js/explorer-detail.js — used inside
       .cx-item-body so the inline expansion mirrors the task-list look. */
    .cx-item-body .yr-detail{padding:0;background:transparent;border-top:none}
    .expdet-headers{
      display:grid;grid-template-columns:max-content 1fr;gap:3px 12px;
      margin-bottom:8px;font-size:12px;background:#fff;
      padding:8px 10px;border:1px solid var(--border);border-radius:4px;
    }
    .expdet-row{display:contents}
    .expdet-label{
      color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;
      font-weight:600;font-size:10.5px;padding-top:2px;
    }
    .expdet-value{color:var(--text);overflow-wrap:anywhere}
    .expdet-section{
      font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;
      font-weight:700;color:var(--text-muted);margin:8px 0 4px 0;
    }
    .expdet-text{
      white-space:pre-wrap;word-break:break-word;font-family:inherit;
      margin:0;padding:8px 10px;background:#fff;border:1px solid var(--border);
      border-radius:4px;line-height:1.5;font-size:12.5px;color:#111827;
      max-height:400px;overflow:auto;
    }
    .expdet-iframe{
      width:100%;height:500px;border:1px solid var(--border);border-radius:4px;background:#fff;
    }
    .expdet-empty{color:var(--text-muted);font-style:italic;font-size:12px}
    .expdet-err{color:#b91c1c;font-size:12px}
    .expdet-attachments{margin-top:8px}
    .expdet-attachment{
      display:inline-block;margin:2px 6px 2px 0;padding:3px 10px;
      font-size:12px;background:#fff;border:1px solid var(--border);border-radius:999px;
      color:var(--text);text-decoration:none;
    }
    .expdet-attachment:hover{background:var(--bg);border-color:var(--primary);color:var(--primary)}
    /* When an item drag is in progress, highlight bucket rows as drop zones */
    .cx-row.cx-drop-eligible{outline:1px dashed rgba(37,99,235,.2);outline-offset:-2px}
    .cx-row.cx-drop-over{background:color-mix(in srgb, var(--primary) 12%, white);outline:2px solid var(--primary);outline-offset:-2px}

    /* Split view: main bucket list on the left, pinned-target pane on the
       right. Right pane is a large drop zone specifically for items. */
    .cx-split{display:flex;min-height:0}
    .cx-split > .cx-list{flex:1;min-width:0}
    .cx-split.split-on > .cx-list{flex:2}
    .cx-split-right{
      flex:1;border-left:2px solid var(--border);background:var(--surface);
      display:flex;flex-direction:column;min-width:280px;max-height:120vh;
    }
    .cx-split-right-header{
      padding:10px 14px;border-bottom:1px solid var(--border);background:#f8fafc;
      display:flex;flex-direction:column;gap:6px;
    }
    .cx-split-right-header label{font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:.4px;font-weight:600}
    .cx-split-target-picker{width:100%;padding:6px 8px;font-size:13px;border:1px solid var(--border);border-radius:4px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
    /* Searchable target picker: chips + search input + filtered listbox */
    .cx-split-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:2px}
    .cx-split-chip{
      font-size:10.5px;text-transform:uppercase;letter-spacing:.3px;font-weight:600;
      padding:2px 8px;border-radius:999px;border:1px solid var(--cat-color,var(--border));
      color:var(--cat-color,var(--text-muted));background:color-mix(in srgb, var(--cat-color,var(--border)) 8%, white);
      cursor:pointer;transition:background .1s, color .1s;
    }
    .cx-split-chip:hover{background:color-mix(in srgb, var(--cat-color,var(--border)) 22%, white)}
    .cx-split-chip.active{background:var(--cat-color,var(--primary));color:#fff;border-color:var(--cat-color,var(--primary))}
    .cx-split-search-wrap{display:flex;flex-direction:column;gap:6px}
    .cx-split-pinned{
      display:flex;align-items:center;gap:6px;font-size:11.5px;color:#374151;
      padding:4px 8px;border-radius:4px;background:color-mix(in srgb, var(--cat-color,var(--primary)) 10%, white);
      border-left:3px solid var(--cat-color,var(--primary));
    }
    .cx-split-pinned code{font-size:11px;background:transparent;padding:0}
    .cx-split-pinned-clear{
      margin-left:auto;background:transparent;border:none;color:#6b7280;cursor:pointer;
      font-size:14px;line-height:1;padding:0 4px;
    }
    .cx-split-pinned-clear:hover{color:#dc2626}
    .cx-split-listbox{
      max-height:220px;overflow:auto;border:1px solid var(--border);border-radius:4px;
      background:#fff;margin-top:4px;
    }
    .cx-split-listbox:empty{display:none}
    .cx-split-opt{
      display:grid;grid-template-columns:72px 1fr auto;gap:8px;align-items:center;
      width:100%;padding:5px 8px;border:none;background:transparent;text-align:left;
      font-size:12px;cursor:pointer;border-bottom:1px solid #f1f5f9;
    }
    .cx-split-opt:hover{background:#f1f5f9}
    .cx-split-opt.active{background:color-mix(in srgb, var(--cat-color,var(--primary)) 15%, white)}
    .cx-split-opt-cat{
      font-size:10px;text-transform:uppercase;letter-spacing:.3px;font-weight:600;
      color:var(--cat-color,var(--text-muted));padding:1px 6px;border-radius:999px;
      background:color-mix(in srgb, var(--cat-color,var(--border)) 12%, white);
      text-align:center;
    }
    .cx-split-opt-sub{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;color:#111827;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .cx-split-opt-count{font-size:11px;color:#6b7280;font-variant-numeric:tabular-nums}
    .cx-split-listbox-empty{padding:8px 10px;color:#94a3b8;font-size:11.5px;font-style:italic}
    .cx-split-dropzone{
      padding:14px;margin:8px 12px;border:2px dashed var(--border);border-radius:6px;
      background:#fafafa;color:#94a3b8;text-align:center;font-size:13px;
      transition:background .12s,border-color .12s,color .12s;
    }
    .cx-split-dropzone.cx-drop-over{background:color-mix(in srgb, var(--primary) 14%, white);border-color:var(--primary);color:var(--primary);font-weight:500}
    .cx-split-right-list{flex:1;overflow:auto;padding:0 4px 12px 4px}
    .cx-split-right-list .cx-items-row{margin:0 4px}
    .cx-split-right-empty{padding:20px 14px;color:#94a3b8;font-size:12.5px;text-align:center;font-style:italic}

    /* Split divider with the "move selected →" arrow */
    .cx-split-divider{
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      width:62px;border-left:1px solid var(--border);border-right:1px solid var(--border);
      background:#f8fafc;gap:8px;padding:14px 4px;
    }
    .cx-move-arrow{
      width:40px;height:40px;border-radius:50%;border:2px solid var(--border);
      background:#fff;color:#94a3b8;font-size:20px;font-weight:700;cursor:not-allowed;
      display:flex;align-items:center;justify-content:center;transition:all .12s;
      padding:0;line-height:1;
    }
    .cx-move-arrow:not(:disabled){
      cursor:pointer;border-color:var(--primary);color:var(--primary);
      background:color-mix(in srgb, var(--primary) 10%, white);
    }
    .cx-move-arrow:not(:disabled):hover{
      background:var(--primary);color:#fff;transform:scale(1.1);
      box-shadow:0 2px 10px rgba(37,99,235,.4);
    }
    .cx-move-arrow-hint{
      font-size:10.5px;color:#94a3b8;text-align:center;line-height:1.25;
      letter-spacing:.2px;
    }
    .cx-move-arrow-hint strong{color:var(--primary);font-size:13px}

    /* Target-picker scope badge (set when a pill is dropped onto the pane) */
    .cx-split-scope{
      display:flex;align-items:center;gap:6px;font-size:11px;
      padding:4px 8px;border-radius:4px;background:color-mix(in srgb, var(--cat-color,var(--primary)) 12%, white);
      border:1px solid var(--cat-color,var(--primary));color:var(--cat-color,var(--primary));
      font-weight:500;
    }
    .cx-split-scope code{font-size:10.5px;background:transparent;padding:0;color:inherit}
    .cx-split-scope-clear{margin-left:auto;background:transparent;border:none;color:inherit;cursor:pointer;font-size:14px;line-height:1;padding:0 4px}
    .cx-split-right.cx-drop-over-scope{outline:3px dashed var(--primary);outline-offset:-3px;background:color-mix(in srgb, var(--primary) 6%, white)}
    .cx-item-kind{font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:#6b7280}
    .cx-item-kind.task{color:#92400e}
    .cx-item-kind.activity{color:#166534}
    .cx-item-kind.email{color:#1e40af}
    .cx-item-kind.event{color:#5b21b6}
    .cx-empty{padding:22px 16px;text-align:center;color:var(--text-muted);font-size:13px}
    /* Merge dialog */
    .cx-dialog-back{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:90;display:flex;align-items:center;justify-content:center}
    .cx-dialog{background:var(--surface);border-radius:10px;min-width:520px;max-width:680px;padding:18px 22px;box-shadow:0 20px 40px rgba(0,0,0,.2)}
    .cx-dialog h3{margin:0 0 12px 0;font-size:15px}
    .cx-dialog-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
    .cx-dialog-foot .spacer{flex:1}
  </style>
</head>
<body>
  <div class="page">
    <div class="page-header">
      <h1 class="page-title">Activity Overview</h1>
    </div>

    <!-- Action bar — local-only buttons depend on server.py (Outlook + Gmail
         scrapers, Claude API suggester) and are hidden on the static deploy. -->
    <div class="act-actions local-only">
      <button class="btn btn-primary" id="btn-import" title="Fast: pull new Outlook + Gmail mail and scrape calendar into the raw archive. No ML, no clustering.">
        <span id="btn-import-label">Import</span>
      </button>
      <button class="btn btn-primary" id="btn-process" title="Slow: index + dedupe mail, run the ML category classifier on mail and calendar, rebuild activity clusters. No LLM calls.">
        <span id="btn-process-label">Process</span>
      </button>
      <button class="btn" id="btn-suggest" title="Opens the API Usage page: previews cost, shows live progress, and lets you stop mid-run.">Plan suggester run…</button>
      <span id="act-status" class="act-status"></span>
    </div>

    <!-- Live progress for Import / Process. Populated by activity-overview.js
         from /api/job-status; survives page reloads as long as the server
         (and thus the chain) is still running. -->
    <div class="job-progress" id="job-progress"></div>

    <!-- At-a-glance stats -->
    <div class="act-section-title">At a glance</div>
    <div class="act-stats" id="act-stats">Loading…</div>

    <!-- Sub-page tiles -->
    <div class="act-section-title">Jump to</div>
    <div class="act-tiles" id="act-tiles"></div>

    <!-- Category Explorer: search all categories, see items, edit or merge -->
    <div class="act-section-title">Category Explorer</div>
    <div class="cx-wrap">
      <div class="cx-header">
        <input type="text" id="cx-search" class="cx-search" placeholder="Search categories, sub-categories, or item titles…">
        <span class="cx-counts" id="cx-counts">loading…</span>
        <button type="button" id="cx-split-btn" class="btn btn-sm" title="Fullscreen Compare: expand the explorer and show the pinned drop target on the right">Fullscreen Compare</button>
        <button type="button" id="cx-expand-btn" class="btn btn-sm" title="Expand to fullscreen — Esc to exit">⤢ Expand</button>
        <button type="button" id="cx-add-btn" class="btn btn-sm btn-primary" title="Add a new sub-category that has no items yet">+ Add sub-category</button>
      </div>
      <div class="cx-pills" id="cx-pills"></div>
      <div class="cx-bulkbar" id="cx-bulkbar" style="display:none"></div>
      <div class="cx-split" id="cx-split">
        <div class="cx-list" id="cx-list"></div>
        <div class="cx-split-divider" id="cx-split-divider" style="display:none">
          <button type="button" id="cx-move-arrow" class="cx-move-arrow" disabled
                  title="Move selected items to the pinned target">→</button>
          <div class="cx-move-arrow-hint" id="cx-move-arrow-hint"></div>
        </div>
        <div class="cx-split-right" id="cx-split-right" style="display:none"></div>
      </div>
    </div>

    <!-- Recent activity feed -->
    <div class="act-section-title">Recent activity</div>
    <div class="act-recent" id="act-recent"></div>
  </div>
  <script src="/rm/js/util.js"></script>
  <script src="/rm/js/nav.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore-compat.js"></script>
  <script src="/rm/js/firebase-bridge.js"></script>
  <script src="/rm/js/api-firestore-adapter.js"></script>
  <script src="/rm/js/api-routes.js"></script>
  <script src="/rm/js/live-sync-helper.js"></script>
  <script src="/rm/js/toast.js"></script>
  <script src="/rm/js/local-cache.js"></script>
  <script src="/rm/js/sync-status.js"></script>
  <script src="/rm/js/profile-bootstrap.js"></script>
  <script src="/rm/js/activity-subnav.js"></script>
  <script src="/rm/js/yr-shared.js"></script>
  <script src="/rm/js/task-editor.js"></script>
  <script src="/rm/js/explorer-detail.js"></script>
  <script src="/rm/js/activity-overview.js"></script>
</body>
</html>
