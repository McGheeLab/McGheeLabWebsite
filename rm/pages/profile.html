<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — McGhee Lab</title>
  <link rel="stylesheet" href="/rm/css/style.css">
  <script src="/rm/js/runtime-mode.js"></script>
  <style>
    .profile-grid{display:grid;grid-template-columns:1fr;gap:16px;max-width:760px}
    .profile-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow)}
    .profile-card h2{font-size:14px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);margin:0 0 12px 0}
    .profile-row{display:flex;align-items:center;gap:10px;font-size:14px;margin-bottom:10px;flex-wrap:wrap}
    .profile-row .lbl{min-width:120px;color:var(--text-muted);font-size:13px}
    .profile-row input[type=text]{flex:1 1 300px;padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit}
    .profile-status{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
    .profile-status.ok{background:#dcfce7;color:#166534}
    .profile-status.off{background:#fee2e2;color:#991b1b}
    .profile-status.pending{background:#fef3c7;color:#92400e}
    .profile-code{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,monospace;font-size:20px;font-weight:700;letter-spacing:3px;padding:6px 12px;background:#f3f4f6;border:1px solid var(--border);border-radius:6px;display:inline-block;user-select:all}
    .profile-msg{font-size:12px;color:var(--text-muted);margin-top:6px;line-height:1.5}
    .profile-msg code{background:#f3f4f6;padding:1px 4px;border-radius:3px;font-size:11px}
  </style>
</head>
<body>
  <div class="page">
    <div class="page-header">
      <h1 class="page-title">Profile &amp; integrations</h1>
    </div>
    <div class="profile-grid" id="profile-grid">Loading\u2026</div>
  </div>
  <script src="/rm/js/util.js"></script>
  <script src="/rm/js/nav.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore-compat.js"></script>
  <script src="/rm/js/firebase-bridge.js"></script>
  <script src="/rm/js/api-firestore-adapter.js"></script>
  <script src="/rm/js/api-routes.js"></script>
  <script src="/rm/js/live-sync-helper.js"></script>
  <script src="/rm/js/toast.js"></script>
  <script src="/rm/js/local-cache.js"></script>
  <script src="/rm/js/sync-status.js"></script>
  <script src="/rm/js/profile-bootstrap.js"></script>
  <script src="/rm/js/profile.js"></script>
</body>
</html>
