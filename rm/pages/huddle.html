<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Huddle — McGhee Lab</title>
  <link rel="stylesheet" href="/rm/css/style.css">
  <link rel="stylesheet" href="/rm/css/huddle.css">
  <script src="/rm/js/runtime-mode.js"></script>
</head>
<body>
  <div class="page">
    <div class="page-header">
      <h1 class="page-title">The Huddle</h1>
    </div>
    <div id="huddle-root"></div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore-compat.js"></script>

  <!-- Google Identity Services — V3.51 brought CalendarService into RM,
       so the Huddle's Lab Schedule view can now overlay Google Calendar
       events on the Team Availability Gantt (admin click "Connect Google
       Calendar" to authorise). -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <!-- RM auth + adapter + cache + nav -->
  <script src="/rm/js/firebase-bridge.js"></script>
  <script src="/rm/js/profile-bootstrap.js"></script>
  <script src="/rm/js/local-cache.js"></script>
  <script src="/rm/js/util.js"></script>
  <script src="/rm/js/api-firestore-adapter.js"></script>
  <script src="/rm/js/api-routes.js"></script>
  <script src="/rm/js/live-sync-helper.js"></script>
  <script src="/rm/js/toast.js"></script>
  <script src="/rm/js/sync-status.js"></script>
  <script src="/rm/js/nav.js"></script>

  <!-- Shared services brought into RM in V3.51 — light up the Huddle's
       Lab Schedule view (recurring availability templates, per-week
       overrides, Team Availability Gantt). schedule-utils provides the
       pure date / time helpers; schedule-service owns the Firestore
       subscriptions (huddleScheduleTemplates, huddleScheduleOverrides,
       scheduleCustomEvents) and the resolver that merges template +
       override + custom-event + calendar events for a given user/day;
       calendar-service handles Google + Outlook + ICS calendar imports
       (sessionStorage-backed tokens — Firestore-backed token refactor
       is a V3.53+ enhancement, not blocking). Renderer at rm/js/huddle.js
       null-checks every McgheeLab.ScheduleService? / .CalendarService?
       call so absence of these services would still degrade gracefully;
       presence lights up the full feature. -->
  <script src="/rm/js/schedule-utils.js"></script>
  <script src="/rm/js/schedule-service.js"></script>
  <script src="/rm/js/calendar-service.js"></script>

  <!-- Page renderer (V3.50 native port). -->
  <script src="/rm/js/huddle.js"></script>
</body>
</html>
