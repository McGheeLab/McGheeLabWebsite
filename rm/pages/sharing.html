<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sharing — McGhee Lab</title>
  <link rel="stylesheet" href="/rm/css/style.css">
  <script src="/rm/js/runtime-mode.js"></script>
  <style>
    .sh-toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px;padding:12px 14px;background:#fff;border:1px solid #e5e7eb;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
    .sh-toolbar .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#6b7280;font-weight:600}
    .sh-toolbar select,.sh-toolbar input,.sh-toolbar button{font-size:13px;padding:6px 10px;border:1px solid #d1d5db;border-radius:6px;background:#fff}
    .sh-toolbar .grow{flex:1 1 auto}

    .sh-tabs{display:flex;gap:4px;margin-bottom:12px;border-bottom:1px solid #e5e7eb}
    .sh-tabs button{background:none;border:none;padding:10px 16px;font-size:13px;font-weight:500;color:#6b7280;cursor:pointer;border-bottom:2px solid transparent}
    .sh-tabs button.active{color:#1e3a8a;border-bottom-color:#2563eb}
    .sh-tabs button[hidden]{display:none}
    .sh-tabs .count{display:inline-block;margin-left:6px;font-size:11px;background:#f3f4f6;color:#6b7280;border-radius:10px;padding:1px 6px}

    .sh-list{display:flex;flex-direction:column;gap:6px}
    .sh-row{display:grid;grid-template-columns:auto 1fr auto auto;gap:10px;align-items:center;padding:10px 12px;background:#fff;border:1px solid #e5e7eb;border-radius:8px;font-size:13px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
    .sh-row .who{font-size:11px;color:#6b7280;font-variant-numeric:tabular-nums}
    .sh-row .who strong{color:#1f2937}
    .sh-row .title{min-width:0}
    .sh-row .title a{color:#1f2937;text-decoration:none;font-weight:500;border-bottom:1px dotted #9ca3af}
    .sh-row .title a:hover{border-bottom-style:solid}
    .sh-row .due{font-size:12px;color:#6b7280;font-variant-numeric:tabular-nums;white-space:nowrap}
    .sh-row .actions{display:flex;gap:6px}
    .sh-row .actions a{font-size:11px;text-decoration:none;padding:3px 8px;border:1px solid #ddd6fe;border-radius:4px;background:#f5f3ff;color:#5b21b6}
    .sh-row .actions a.task{border-color:#dbeafe;background:#eff6ff;color:#1e40af}
    .sh-chip{display:inline-block;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:2px 6px;border-radius:8px;margin-right:6px;vertical-align:middle}
    .sh-chip.paper-assigned{background:#fee2e2;color:#991b1b}
    .sh-chip.paper-suggested{background:#dbeafe;color:#1e3a8a}
    .sh-chip.task{background:#f3f4f6;color:#374151}
    .sh-chip.done{background:#dcfce7;color:#166534}
    .sh-chip.overdue{background:#fee2e2;color:#991b1b}

    .sh-empty{padding:24px;text-align:center;color:#9ca3af;font-size:13px;background:#fff;border:1px dashed #e5e7eb;border-radius:8px}
    .sh-loading{padding:18px;text-align:center;color:#6b7280;font-size:13px}
    .sh-error{padding:14px;background:#fef2f2;border:1px solid #fecaca;color:#991b1b;border-radius:8px;font-size:13px;margin-bottom:12px}

    .sh-detail{margin-top:6px;padding:8px 10px;background:#fafaf9;border:1px solid #e7e5e4;border-radius:6px;font-size:12px;color:#374151;white-space:pre-wrap}
    .sh-detail .ann-card{background:#fff;border:1px solid #e5e7eb;border-radius:5px;padding:6px 8px;margin-top:6px}
    .sh-detail .ann-card .meta{font-size:10px;color:#9ca3af;margin-top:2px}
  </style>
</head>
<body>
  <div class="page">
    <div class="page-header">
      <h1 class="page-title">Sharing &amp; Assignments</h1>
      <div class="sh-toolbar">
        <span class="lbl">Filter</span>
        <select id="sh-kind">
          <option value="all">All kinds</option>
          <option value="paper">Papers only</option>
          <option value="task">Plain tasks only</option>
        </select>
        <select id="sh-status">
          <option value="open">Open</option>
          <option value="all">All (incl. done)</option>
          <option value="done">Done only</option>
        </select>
        <select id="sh-counterparty">
          <option value="">Anyone</option>
        </select>
        <span class="grow"></span>
        <button id="sh-refresh" title="Re-fetch from Firestore">↻ Refresh</button>
      </div>
      <div class="sh-tabs" id="sh-tabs">
        <button data-tab="sent" class="active">Sent by me <span class="count" data-count="sent">0</span></button>
        <button data-tab="assigned">Assigned to me <span class="count" data-count="assigned">0</span></button>
        <button data-tab="lab" hidden>Lab-wide <span class="count" data-count="lab">0</span></button>
      </div>
    </div>
    <div id="sh-content" class="sh-loading">Loading…</div>
  </div>
  <script src="/rm/js/util.js"></script>
  <script src="/rm/js/nav.js"></script>
  <script src="/rm/js/activity-subnav.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore-compat.js"></script>
  <script src="/rm/js/firebase-bridge.js"></script>
  <script src="/rm/js/api-firestore-adapter.js"></script>
  <script src="/rm/js/api-routes.js"></script>
  <script src="/rm/js/profile-bootstrap.js"></script>
  <script src="/rm/js/sharing.js"></script>
</body>
</html>
