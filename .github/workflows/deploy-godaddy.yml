name: Deploy to GoDaddy

on:
  push:
    branches:
      - main
      # Add your working branch if you want it to deploy too:
      # - Version-*

jobs:
  deploy:
    name: FTP Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          # Only upload files that changed (faster deploys)
          state-name: .ftp-deploy-sync-state.json
          # Skip git/dev files that don't belong on the live site
          exclude: |
            **/.git*
            **/.git*/**
            .github/**
            CodeLog/**
            Research/**
            scripts/**
            requirements.txt
            CLAUDE.md
            .claude/**
